version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sgls-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: liastudio_db
      MYSQL_USER: liastudio_user
      MYSQL_PASSWORD: liastudio123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql-data: